<svg width="800" height="500" viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Grid -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#f0f0f0" stroke-width="1"/>
    </pattern>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 Z" fill="#2563eb"/>
    </marker>
    <marker id="arrowPurple" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 Z" fill="#9333ea"/>
    </marker>
  </defs>
  <rect width="800" height="500" fill="url(#grid)"/>

  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" font-size="24" font-weight="bold" fill="#1e40af">EPLB Load Balancing Strategies</text>

  <!-- Hierarchical Load Balancing -->
  <g transform="translate(50, 80)">
    <rect x="0" y="0" width="300" height="380" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
    <text x="150" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#1e40af">Hierarchical Load Balancing</text>
    
    <!-- Step 1: Group Distribution -->
    <g transform="translate(20, 60)">
      <rect x="0" y="0" width="260" height="80" rx="4" fill="white" stroke="#3b82f6" stroke-width="1"/>
      <text x="130" y="20" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e40af">Step 1: Group Distribution</text>
      
      <rect x="20" y="30" width="100" height="40" rx="4" fill="#bfdbfe" stroke="#3b82f6" stroke-width="1"/>
      <text x="70" y="55" text-anchor="middle" font-size="12" fill="#1e40af">Node 1</text>
      
      <rect x="140" y="30" width="100" height="40" rx="4" fill="#bfdbfe" stroke="#3b82f6" stroke-width="1"/>
      <text x="190" y="55" text-anchor="middle" font-size="12" fill="#1e40af">Node 2</text>
    </g>
    
    <!-- Step 2: Expert Replication -->
    <g transform="translate(20, 160)">
      <rect x="0" y="0" width="260" height="80" rx="4" fill="white" stroke="#3b82f6" stroke-width="1"/>
      <text x="130" y="20" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e40af">Step 2: Expert Replication</text>
      
      <rect x="20" y="30" width="40" height="30" rx="4" fill="#93c5fd" stroke="#3b82f6" stroke-width="1"/>
      <text x="40" y="50" text-anchor="middle" font-size="10" fill="#1e40af">E1</text>
      
      <rect x="70" y="30" width="40" height="30" rx="4" fill="#93c5fd" stroke="#3b82f6" stroke-width="1"/>
      <text x="90" y="50" text-anchor="middle" font-size="10" fill="#1e40af">E2</text>
      
      <rect x="20" y="40" width="40" height="30" rx="4" fill="#93c5fd" stroke="#3b82f6" stroke-width="1" opacity="0.6"/>
      <text x="40" y="60" text-anchor="middle" font-size="10" fill="#1e40af">E1'</text>
      
      <rect x="140" y="30" width="40" height="30" rx="4" fill="#93c5fd" stroke="#3b82f6" stroke-width="1"/>
      <text x="160" y="50" text-anchor="middle" font-size="10" fill="#1e40af">E3</text>
      
      <rect x="190" y="30" width="40" height="30" rx="4" fill="#93c5fd" stroke="#3b82f6" stroke-width="1"/>
      <text x="210" y="50" text-anchor="middle" font-size="10" fill="#1e40af">E4</text>
      
      <rect x="140" y="40" width="40" height="30" rx="4" fill="#93c5fd" stroke="#3b82f6" stroke-width="1" opacity="0.6"/>
      <text x="160" y="60" text-anchor="middle" font-size="10" fill="#1e40af">E3'</text>
    </g>
    
    <!-- Step 3: GPU Assignment -->
    <g transform="translate(20, 260)">
      <rect x="0" y="0" width="260" height="100" rx="4" fill="white" stroke="#3b82f6" stroke-width="1"/>
      <text x="130" y="20" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e40af">Step 3: GPU Assignment</text>
      
      <rect x="20" y="30" width="50" height="30" rx="4" fill="#fee2e2" stroke="#ef4444" stroke-width="1"/>
      <text x="45" y="50" text-anchor="middle" font-size="10" fill="#b91c1c">GPU 1</text>
      
      <rect x="80" y="30" width="50" height="30" rx="4" fill="#fee2e2" stroke="#ef4444" stroke-width="1"/>
      <text x="105" y="50" text-anchor="middle" font-size="10" fill="#b91c1c">GPU 2</text>
      
      <rect x="140" y="30" width="50" height="30" rx="4" fill="#fee2e2" stroke="#ef4444" stroke-width="1"/>
      <text x="165" y="50" text-anchor="middle" font-size="10" fill="#b91c1c">GPU 3</text>
      
      <rect x="200" y="30" width="50" height="30" rx="4" fill="#fee2e2" stroke="#ef4444" stroke-width="1"/>
      <text x="225" y="50" text-anchor="middle" font-size="10" fill="#b91c1c">GPU 4</text>
      
      <text x="45" y="75" text-anchor="middle" font-size="10" fill="#b91c1c">E1, E2</text>
      <text x="105" y="75" text-anchor="middle" font-size="10" fill="#b91c1c">E1'</text>
      <text x="165" y="75" text-anchor="middle" font-size="10" fill="#b91c1c">E3, E4</text>
      <text x="225" y="75" text-anchor="middle" font-size="10" fill="#b91c1c">E3'</text>
    </g>
  </g>
  
  <!-- Global Load Balancing -->
  <g transform="translate(450, 80)">
    <rect x="0" y="0" width="300" height="380" rx="8" fill="#f3e8ff" stroke="#9333ea" stroke-width="2"/>
    <text x="150" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#7e22ce">Global Load Balancing</text>
    
    <!-- Step 1: Expert Load Analysis -->
    <g transform="translate(20, 60)">
      <rect x="0" y="0" width="260" height="80" rx="4" fill="white" stroke="#9333ea" stroke-width="1"/>
      <text x="130" y="20" text-anchor="middle" font-size="14" font-weight="bold" fill="#7e22ce">Step 1: Expert Load Analysis</text>
      
      <rect x="20" y="40" width="40" height="30" rx="4" fill="#e9d5ff" stroke="#9333ea" stroke-width="1"/>
      <text x="40" y="60" text-anchor="middle" font-size="10" fill="#7e22ce">E1</text>
      
      <rect x="70" y="30" width="40" height="40" rx="4" fill="#e9d5ff" stroke="#9333ea" stroke-width="1"/>
      <text x="90" y="55" text-anchor="middle" font-size="10" fill="#7e22ce">E2</text>
      
      <rect x="120" y="45" width="40" height="25" rx="4" fill="#e9d5ff" stroke="#9333ea" stroke-width="1"/>
      <text x="140" y="62" text-anchor="middle" font-size="10" fill="#7e22ce">E3</text>
      
      <rect x="170" y="35" width="40" height="35" rx="4" fill="#e9d5ff" stroke="#9333ea" stroke-width="1"/>
      <text x="190" y="57" text-anchor="middle" font-size="10" fill="#7e22ce">E4</text>
      
      <rect x="220" y="25" width="40" height="45" rx="4" fill="#e9d5ff" stroke="#9333ea" stroke-width="1"/>
      <text x="240" y="52" text-anchor="middle" font-size="10" fill="#7e22ce">E5</text>
    </g>
    
    <!-- Step 2: Global Replication -->
    <g transform="translate(20, 160)">
      <rect x="0" y="0" width="260" height="80" rx="4" fill="white" stroke="#9333ea" stroke-width="1"/>
      <text x="130" y="20" text-anchor="middle" font-size="14" font-weight="bold" fill="#7e22ce">Step 2: Global Replication</text>
      
      <rect x="20" y="40" width="30" height="30" rx="4" fill="#e9d5ff" stroke="#9333ea" stroke-width="1"/>
      <text x="35" y="60" text-anchor="middle" font-size="10" fill="#7e22ce">E1</text>
      
      <rect x="60" y="30" width="30" height="40" rx="4" fill="#e9d5ff" stroke="#9333ea" stroke-width="1"/>
      <text x="75" y="55" text-anchor="middle" font-size="10" fill="#7e22ce">E2</text>
      
      <rect x="60" y="40" width="30" height="40" rx="4" fill="#e9d5ff" stroke="#9333ea" stroke-width="1" opacity="0.6"/>
      <text x="75" y="65" text-anchor="middle" font-size="10" fill="#7e22ce">E2'</text>
      
      <rect x="100" y="45" width="30" height="25" rx="4" fill="#e9d5ff" stroke="#9333ea" stroke-width="1"/>
      <text x="115" y="62" text-anchor="middle" font-size="10" fill="#7e22ce">E3</text>
      
      <rect x="140" y="35" width="30" height="35" rx="4" fill="#e9d5ff" stroke="#9333ea" stroke-width="1"/>
      <text x="155" y="57" text-anchor="middle" font-size="10" fill="#7e22ce">E4</text>
      
      <rect x="180" y="25" width="30" height="45" rx="4" fill="#e9d5ff" stroke="#9333ea" stroke-width="1"/>
      <text x="195" y="52" text-anchor="middle" font-size="10" fill="#7e22ce">E5</text>
      
      <rect x="180" y="35" width="30" height="45" rx="4" fill="#e9d5ff" stroke="#9333ea" stroke-width="1" opacity="0.6"/>
      <text x="195" y="62" text-anchor="middle" font-size="10" fill="#7e22ce">E5'</text>
      
      <rect x="180" y="45" width="30" height="45" rx="4" fill="#e9d5ff" stroke="#9333ea" stroke-width="1" opacity="0.4"/>
      <text x="195" y="72" text-anchor="middle" font-size="10" fill="#7e22ce">E5''</text>
    </g>
    
    <!-- Step 3: GPU Assignment -->
    <g transform="translate(20, 260)">
      <rect x="0" y="0" width="260" height="100" rx="4" fill="white" stroke="#9333ea" stroke-width="1"/>
      <text x="130" y="20" text-anchor="middle" font-size="14" font-weight="bold" fill="#7e22ce">Step 3: GPU Assignment</text>
      
      <rect x="20" y="30" width="50" height="30" rx="4" fill="#fee2e2" stroke="#ef4444" stroke-width="1"/>
      <text x="45" y="50" text-anchor="middle" font-size="10" fill="#b91c1c">GPU 1</text>
      
      <rect x="80" y="30" width="50" height="30" rx="4" fill="#fee2e2" stroke="#ef4444" stroke-width="1"/>
      <text x="105" y="50" text-anchor="middle" font-size="10" fill="#b91c1c">GPU 2</text>
      
      <rect x="140" y="30" width="50" height="30" rx="4" fill="#fee2e2" stroke="#ef4444" stroke-width="1"/>
      <text x="165" y="50" text-anchor="middle" font-size="10" fill="#b91c1c">GPU 3</text>
      
      <rect x="200" y="30" width="50" height="30" rx="4" fill="#fee2e2" stroke="#ef4444" stroke-width="1"/>
      <text x="225" y="50" text-anchor="middle" font-size="10" fill="#b91c1c">GPU 4</text>
      
      <text x="45" y="75" text-anchor="middle" font-size="10" fill="#b91c1c">E1, E3, E5</text>
      <text x="105" y="75" text-anchor="middle" font-size="10" fill="#b91c1c">E2, E4, E5'</text>
      <text x="165" y="75" text-anchor="middle" font-size="10" fill="#b91c1c">E2', E5''</text>
      <text x="225" y="75" text-anchor="middle" font-size="10" fill="#b91c1c">E4</text>
    </g>
  </g>
  
  <!-- Arrows -->
  <g stroke="#2563eb" stroke-width="2" marker-end="url(#arrowBlue)">
    <path d="M 200 150 L 200 160" fill="none"/>
    <path d="M 200 250 L 200 260" fill="none"/>
  </g>
  
  <g stroke="#9333ea" stroke-width="2" marker-end="url(#arrowPurple)">
    <path d="M 600 150 L 600 160" fill="none"/>
    <path d="M 600 250 L 600 260" fill="none"/>
  </g>
</svg> 